services:
  - type: web
    name: SportSkyline
    runtime: python
    rootDir: backend
    buildCommand: pip install -r requirements.txt
    startCommand: bash -lc 'uvicorn app.main:app --host 0.0.0.0 --port ${PORT:-10000}'
    envVars:
      - key: PYTHON_VERSION
        value: 3.11.0
      - key: ENVIRONMENT
        value: production
      - key: DEBUG
        value: false
      # ── Supabase connection pooler (IPv4-compatible for Render free tier) ──
      # Direct connection (port 5432) requires IPv6 which Render free tier lacks.
      # Supavisor pooler (port 6543) works over IPv4 but needs statement_cache_size=0.
      - key: DATABASE_URL
        value: postgresql+asyncpg://postgres.ymvrbixwcxcvjaaoofcp:%40Arthikandev@aws-0-ap-south-1.pooler.supabase.com:6543/postgres
      - key: DATABASE_POOL_SIZE
        value: 5
      - key: DATABASE_MAX_OVERFLOW
        value: 10
      # ── Supabase ──────────────────────────────────────────────────────────
      - key: SUPABASE_URL
        value: https://ymvrbixwcxcvjaaoofcp.supabase.co
      - key: SUPABASE_ANON_KEY
        value: sb_publishable_RRrh4fYq65mp1lpfQ_uk1A_tO1wTlmB
      - key: SUPABASE_STORAGE_BUCKET
        value: sportskyline-media
      # ── JWT ───────────────────────────────────────────────────────────────
      - key: JWT_ALGORITHM
        value: HS256
      - key: JWT_ACCESS_TOKEN_EXPIRE_MINUTES
        value: 60
      - key: JWT_REFRESH_TOKEN_EXPIRE_DAYS
        value: 30
      # ── CORS ──────────────────────────────────────────────────────────────
      - key: CORS_ORIGINS
        value: https://sportskyline.onrender.com,http://localhost:5500,http://127.0.0.1:5500
      # ── Admin Bootstrap ───────────────────────────────────────────────────
      - key: FIRST_ADMIN_EMAIL
        value: admin@sportskyline.com
      - key: FIRST_ADMIN_NAME
        value: Super Admin
