services:
  - type: web
    name: SportSkyline
    runtime: python
    rootDir: backend
    buildCommand: pip install -r requirements.txt
    startCommand: bash -lc 'uvicorn app.main:app --host 0.0.0.0 --port ${PORT:-10000}'
    envVars:
      - key: PYTHON_VERSION
        value: 3.11.0
      - key: ENVIRONMENT
        value: production
      - key: DEBUG
        value: false
      # Keep secrets in Render dashboard, not in git.
      - key: DATABASE_URL
        sync: false
      - key: DATABASE_POOL_SIZE
        value: 5
      - key: DATABASE_MAX_OVERFLOW
        value: 10
      # ── Supabase ──────────────────────────────────────────────────────────
      - key: SUPABASE_URL
        sync: false
      - key: SUPABASE_ANON_KEY
        sync: false
      - key: SUPABASE_STORAGE_BUCKET
        value: sportskyline-media
      # ── JWT ───────────────────────────────────────────────────────────────
      - key: JWT_ALGORITHM
        value: HS256
      - key: JWT_ACCESS_TOKEN_EXPIRE_MINUTES
        value: 60
      - key: JWT_REFRESH_TOKEN_EXPIRE_DAYS
        value: 30
      # ── CORS ──────────────────────────────────────────────────────────────
      - key: CORS_ORIGINS
        value: https://sportskyline.onrender.com,http://localhost:5500,http://127.0.0.1:5500
      # ── Admin Bootstrap ───────────────────────────────────────────────────
      - key: FIRST_ADMIN_EMAIL
        sync: false
      - key: FIRST_ADMIN_PASSWORD
        sync: false
      - key: FIRST_ADMIN_NAME
        sync: false
